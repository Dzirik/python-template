# logger for logging into the console only
# NOTSET=0.
# DEBUG=10.
# INFO=20.
# WARN=30.
# ERROR=40.
# CRITICAL=50.

version = 1
disable_existing_loggers = false

[formatters.full_formatter]
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[handlers.console_handler]
class = "logging.StreamHandler"
level = "DEBUG"
formatter = "full_formatter"
stream = "ext://sys.stdout"

# Root level policy: DEBUG (full verbosity). Console output isn't persisted or size-capped, so
# nothing is lost keeping every level. See "logger_file_limit.toml"/"logger_file_limit_console.toml"
# for the deliberate INFO divergence used by byte-capped rotating-file profiles.
[root]
level = "DEBUG"
handlers = ["console_handler"]
