# The main usage of this logger is in notebooks, where console output is needed, but file has to be limit due
# to its unlimited growth in case of automatic runs.
# For more details see on limit logger see "logger_file_limit.toml" file.
# Note: limits to ~5 mega - 5242880.
# NOTSET=0.
# DEBUG=10.
# INFO=20.
# WARN=30.
# ERROR=40.
# CRITICAL=50.

version = 1
disable_existing_loggers = false

[formatters.full_formatter]
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[handlers.file_handler]
class = "logging.handlers.RotatingFileHandler"
level = "DEBUG"
formatter = "full_formatter"
filename = "logs/python_log_file_limit_console.log"
mode = "a"
maxBytes = 5_242_880
backupCount = 2 # number of backup files

[handlers.console_handler]
class = "logging.StreamHandler"
level = "DEBUG"
formatter = "full_formatter"
stream = "ext://sys.stdout"

# Root level policy: INFO — a deliberate divergence from the unlimited "logger_file.toml"/
# "logger_console.toml" profiles (which stay at DEBUG). The file handler here is a byte-capped
# RotatingFileHandler (5MB, 2 backups); DEBUG-level noise would burn through that budget quickly
# and evict older, more meaningful entries, so root is raised to INFO to conserve it (this also
# caps the console handler at INFO, since root filters before either handler is reached).
[root]
level = "INFO"
handlers = ["file_handler", "console_handler"]
