# logger for logging into the file only
# https://gist.github.com/amamaenko/653743
# https://docs.python.org/3/library/logging.handlers.html#logging.handlers.RotatingFileHandler
# limits to ~5 mega - 5242880.
# NOTSET=0.
# DEBUG=10.
# INFO=20.
# WARN=30.
# ERROR=40.
# CRITICAL=50.

version = 1
disable_existing_loggers = false

[formatters.full_formatter]
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[handlers.file_handler]
class = "logging.handlers.RotatingFileHandler"
level = "DEBUG"
formatter = "full_formatter"
filename = "logs/python_log_file_limit.log"
mode = "a"
maxBytes = 5_242_880
backupCount = 2 # number of backup files

# Root level policy: INFO — a deliberate divergence from the unlimited "logger_file.toml"/
# "logger_console.toml" profiles (which stay at DEBUG). This handler is a byte-capped
# RotatingFileHandler (5MB, 2 backups); DEBUG-level noise would burn through that budget quickly
# and evict older, more meaningful entries, so root is raised to INFO to conserve it.
[root]
level = "INFO"
handlers = ["file_handler"]
